version: '3'

services:
  notebooklm_bridge:
    # Usar uma imagem com ferramentas de build já inclusas ajuda na compatibilidade
    image: python:3.11-bullseye 
    container_name: notebooklm-mcp-bridge
    restart: unless-stopped
    ports:
      - "3200:3200" # Já ajustado para a porta que você definiu
    environment:
      - PYTHONUNBUFFERED=1
    # Adicionamos um passo de verificação antes do comando principal
    command: >
      sh -c "pip install notebooklm-mcp-cli && python3 -c 'import notebooklm_mcp_cli; print(\"Success\")' && python3 -m notebooklm_mcp_cli.main"
    volumes:
      - ./data:/app/data
