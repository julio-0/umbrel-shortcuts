version: '3'

services:
  notebooklm_bridge:
    image: python:3.10-slim
    container_name: notebooklm-mcp-bridge
    restart: unless-stopped
    ports:
      - "3200:3200"
    environment:
      - PYTHONUNBUFFERED=1
    # O comando abaixo instala e inicia o serviço do MCP em background ou via loop de polling se necessário
    # Para uma instalação definitiva, recomenda-se construir a imagem com as libs necessárias.
    command: >
      sh -c "pip install notebooklm-mcp-cli && python3 -m notebooklm_mcp_cli.main"
    volumes:
      - ./data:/app/data