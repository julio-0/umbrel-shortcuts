# =============================================================================
# notebooklm-mcp — Bridge para OpenClaw no umbrelOS
# Projeto: PleasePrompto/notebooklm-mcp (npm)
# =============================================================================
#
# ESTRUTURA DE DIRETÓRIOS esperada no host:
#   ./notebooklm-mcp/
#   ├── docker-compose.yml       ← este arquivo
#   └── data/                    ← criado automaticamente pelo volume
#       └── chrome-profile/      ← perfil Chrome persistido após auth
#
# PORTAS:
#   3000 → endpoint MCP (Streamable-HTTP) — usado pelo OpenClaw
#   6080 → noVNC (acesso visual ao Chrome para auth inicial)
#
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Servidor noVNC — display virtual para o setup_auth inicial
  # Pode ser desligado após concluir a autenticação Google
  # ---------------------------------------------------------------------------
  novnc:
    image: theasp/novnc:latest
    container_name: notebooklm-novnc
    restart: unless-stopped
    environment:
      - DISPLAY_WIDTH=1280
      - DISPLAY_HEIGHT=720
      - RUN_XTERM=no
    ports:
      - "6080:8080"             # acesse http://<ip-umbrel>:6080/vnc.html
    networks:
      - notebooklm-net

  # ---------------------------------------------------------------------------
  # Servidor MCP principal
  # ---------------------------------------------------------------------------
  notebooklm-mcp:
    image: node:20-slim
    container_name: notebooklm-mcp
    restart: unless-stopped
    depends_on:
      - novnc

    # Variáveis de ambiente do notebooklm-mcp
    # Ref: https://github.com/PleasePrompto/notebooklm-mcp/blob/main/docs/configuration.md
    environment:
      # --- Transporte MCP ---
      - NOTEBOOKLM_TRANSPORT=http
      - NOTEBOOKLM_PORT=3000
      - NOTEBOOKLM_HOST=0.0.0.0   # necessário para acesso da rede Docker/LAN

      # --- Display virtual (compartilhado com noVNC) ---
      - DISPLAY=novnc:0.0         # aponta para o container noVNC

      # --- Chrome ---
      - BROWSER_HEADLESS=true     # headless após o setup_auth inicial
      - NOTEBOOK_PROFILE_STRATEGY=auto

      # --- Conta Google (opcional — define o "account slug" do perfil) ---
      # - NOTEBOOKLM_ACCOUNT=default

    ports:
      - "3000:3000"               # endpoint consumido pelo OpenClaw

    volumes:
      # Persiste o perfil Chrome autenticado entre reinicializações
      - ./data/chrome-profile:/root/.config/notebooklm-mcp

    networks:
      - notebooklm-net

    # Instala dependências do Chromium e sobe o servidor
    # xvfb-run garante display disponível caso o noVNC não esteja acessível
    command: >
      bash -c "
        export PATH=/usr/local/lib/node_modules/.bin:/usr/local/bin:$$PATH && apt-get update -qq && apt-get install -y --no-install-recommends chromium xvfb fonts-liberation libatk-bridge2.0-0 libatk1.0-0 libcups2 libdbus-1-3 libgbm1 libnss3 libxcomposite1 libxdamage1 libxrandr2 xdg-utils ca-certificates curl 2>/dev/null && npm install -g npx 2>/dev/null || true && echo '✅ Dependências instaladas' && npx --yes notebooklm-mcp@latest --transport http --port 3000 --host 0.0.0.0 
        "

    # Saúde do serviço — verifica se o endpoint MCP responde
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/mcp"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s      # dá tempo para o npx baixar o pacote

# -----------------------------------------------------------------------------
# Rede interna — isolada, shared com o OpenClaw se estiver no mesmo compose
# Se o OpenClaw já tem sua própria rede, adicione-a em `networks` acima e
# referencie aqui como `external: true`
# -----------------------------------------------------------------------------
networks:
  notebooklm-net:
    driver: bridge
    name: notebooklm-net

# =============================================================================
# NOTA SOBRE INTEGRAÇÃO COM OPENCLAW
#
# Se o OpenClaw roda em um docker-compose separado no umbrelOS,
# conecte as duas redes assim:
#
# No compose do OpenClaw, adicione:
#   networks:
#     notebooklm-net:
#       external: true
#
# E no openclaw.json:
#   {
#     "mcp": {
#       "servers": {
#         "notebooklm": {
#           "url": "http://notebooklm-mcp:3000/mcp",
#           "transport": "streamable-http",
#           "timeout": 60
#         }
#       }
#     }
#   }
#
# Se preferir usar IP da LAN (mais simples, sem compartilhar rede Docker):
#   "url": "http://192.168.x.x:3000/mcp"
# =============================================================================
